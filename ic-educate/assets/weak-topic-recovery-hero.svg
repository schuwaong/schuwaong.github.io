<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">IC Educate weak topic recovery dashboard</title>
  <desc id="desc">A premium diagnostic dashboard showing weak topic detection, a seven day recovery path, and parent-ready study actions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ed"/>
      <stop offset=".46" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#fff0f7"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241b2f"/>
      <stop offset=".58" stop-color="#2c3765"/>
      <stop offset="1" stop-color="#0f8b6f"/>
    </linearGradient>
    <linearGradient id="pinkBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f15f98"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe5a7"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#2a2032" flood-opacity=".18"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#2a2032" flood-opacity=".12"/>
    </filter>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0v46" fill="none" stroke="#2a2032" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="900" rx="64" fill="url(#bg)"/>
  <rect width="1200" height="900" rx="64" fill="url(#grid)"/>
  <circle cx="1060" cy="116" r="190" fill="#2563eb" opacity=".12"/>
  <circle cx="124" cy="146" r="170" fill="#f15f98" opacity=".14"/>
  <circle cx="980" cy="760" r="210" fill="#0f8b6f" opacity=".11"/>

  <g filter="url(#shadow)">
    <rect x="86" y="80" width="1028" height="742" rx="44" fill="#fffaf4" fill-opacity=".84" stroke="#fff" stroke-width="3"/>
  </g>

  <g transform="translate(136 130)">
    <rect width="928" height="88" rx="28" fill="#ffffff" fill-opacity=".72" stroke="#ffffff" stroke-width="2"/>
    <circle cx="42" cy="44" r="19" fill="url(#pinkBlue)"/>
    <text x="74" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#241b2f">IC Educate Diagnostic</text>
    <text x="74" y="64" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#745f69">Parent-ready weak topic scan</text>
    <g transform="translate(694 20)">
      <rect width="206" height="48" rx="24" fill="#241b2f"/>
      <text x="103" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="#ffffff">7 DAY FIX READY</text>
    </g>
  </g>

  <g transform="translate(136 254)" filter="url(#soft)">
    <rect width="444" height="420" rx="34" fill="#241b2f"/>
    <path d="M0 88C108 42 218 40 330 70c58 16 94 11 114-5v355H0Z" fill="#2f3a69" opacity=".84"/>
    <circle cx="90" cy="332" r="128" fill="#f15f98" opacity=".14"/>
    <circle cx="366" cy="72" r="118" fill="#2563eb" opacity=".18"/>
    <text x="34" y="68" font-family="Arial, sans-serif" font-size="15" font-weight="900" letter-spacing="2" fill="#ffcce0">WEAK TOPIC FOUND</text>
    <text x="34" y="126" font-family="Arial, sans-serif" font-size="46" font-weight="900" fill="#ffffff">Fractions</text>
    <text x="34" y="170" font-family="Arial, sans-serif" font-size="46" font-weight="900" fill="#ffffff">and ratio</text>
    <text x="34" y="210" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#d9e4ff">Fix the method gap before adding more worksheets.</text>

    <g transform="translate(34 250)">
      <rect width="376" height="112" rx="24" fill="#ffffff" fill-opacity=".12" stroke="#ffffff" stroke-opacity=".16"/>
      <path d="M42 76 94 42l55 22 62-50 58 30 54-20" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M42 76 94 42l55 22 62-50 58 30 54-20" fill="none" stroke="#f6b447" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="26" y="32" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#ffffff" opacity=".8">Confidence trend</text>
      <text x="306" y="92" font-family="Arial, sans-serif" font-size="13" font-weight="900" fill="#ffe5a7">+31%</text>
    </g>
  </g>

  <g transform="translate(620 254)" filter="url(#soft)">
    <rect width="444" height="250" rx="34" fill="#ffffff" fill-opacity=".86" stroke="#ffffff" stroke-width="2"/>
    <text x="32" y="54" font-family="Arial, sans-serif" font-size="16" font-weight="900" letter-spacing="2" fill="#2563eb">RECOVERY PATH</text>
    <text x="32" y="92" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#241b2f">Fix it in 7 days</text>
    <g transform="translate(32 126)">
      <g>
        <circle cx="18" cy="18" r="18" fill="url(#pinkBlue)"/>
        <text x="18" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#fff">1</text>
        <text x="0" y="62" font-family="Arial, sans-serif" font-size="12" font-weight="800" fill="#745f69">Scan</text>
      </g>
      <g transform="translate(58)">
        <rect x="-18" y="16" width="54" height="4" rx="2" fill="#d8d3dc"/>
        <circle cx="54" cy="18" r="18" fill="#fff4dc" stroke="#f4c46d"/>
        <text x="54" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#a16207">2</text>
        <text x="36" y="62" font-family="Arial, sans-serif" font-size="12" font-weight="800" fill="#745f69">Teach</text>
      </g>
      <g transform="translate(124)">
        <rect x="-18" y="16" width="54" height="4" rx="2" fill="#d8d3dc"/>
        <circle cx="54" cy="18" r="18" fill="#eef7ff" stroke="#9ec5ff"/>
        <text x="54" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#2563eb">3</text>
        <text x="34" y="62" font-family="Arial, sans-serif" font-size="12" font-weight="800" fill="#745f69">Drill</text>
      </g>
      <g transform="translate(190)">
        <rect x="-18" y="16" width="54" height="4" rx="2" fill="#d8d3dc"/>
        <circle cx="54" cy="18" r="18" fill="#effaf6" stroke="#9edbc8"/>
        <text x="54" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#0f8b6f">7</text>
        <text x="31" y="62" font-family="Arial, sans-serif" font-size="12" font-weight="800" fill="#745f69">Retest</text>
      </g>
    </g>
  </g>

  <g transform="translate(620 534)" filter="url(#soft)">
    <rect width="444" height="140" rx="32" fill="url(#ink)"/>
    <text x="30" y="48" font-family="Arial, sans-serif" font-size="15" font-weight="900" letter-spacing="2" fill="#bdebdc">NEXT BEST ACTION</text>
    <text x="30" y="86" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#ffffff">Tutor handoff brief</text>
    <text x="30" y="114" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#dce8ff">Share the weak topic, plan, and missed steps.</text>
    <g transform="translate(330 34)">
      <circle cx="38" cy="38" r="38" fill="#ffffff" fill-opacity=".16"/>
      <path d="M26 39h24M38 27v24" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(146 704)">
    <rect width="908" height="70" rx="35" fill="#ffffff" fill-opacity=".68" stroke="#ffffff" stroke-width="2"/>
    <text x="38" y="44" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#241b2f">Parent result:</text>
    <text x="176" y="44" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#745f69">clear weakness, tonight's task, 7-day path, tutor-ready handoff.</text>
  </g>
</svg>
