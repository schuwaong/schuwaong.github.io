<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IC Educate Offline</title>
    <meta name="theme-color" content="#0f766e" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./assets/pwa/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="tutor-page">
    <main class="page tutor-page-main">
      <section class="tutor-hero">
        <div class="tutor-hero-copy">
          <p class="eyebrow">IC Educate app</p>
          <h1>You are offline.</h1>
          <p class="intro">
            The app shell is available, but this page was not cached yet. Reconnect once,
            open the page again, and it will be ready for the next visit.
          </p>
          <div class="hero-actions">
            <a class="button primary" href="./index.html">Open IC Educate</a>
            <a class="button secondary" href="./admin.html">Admin queue</a>
            <a class="button secondary" href="./find-tutor.html">Find a tutor</a>
            <a class="button secondary" href="./teachers.html">Teacher signup</a>
          </div>
        </div>
        <aside class="paper-studio">
          <figure class="lead-visual">
            <img src="./assets/space-dashboard.svg" alt="IC Educate app dashboard" />
            <figcaption>
              <span class="chip">Offline shell</span>
              <span class="chip">Local queue</span>
            </figcaption>
          </figure>
        </aside>
      </section>
    </main>
  </body>
</html>
