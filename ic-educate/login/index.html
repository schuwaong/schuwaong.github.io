<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in | IC Educate</title>
    <meta name="description" content="Sign in to IC Educate and choose your student or teacher account type." />
    <meta name="theme-color" content="#0f766e" />
    <link rel="icon" href="../../favicon.png" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="marketplace-page login-page">
    <header class="site-header login-header">
      <a id="loginHomeLink" class="brand" href="../find-tutor.html" aria-label="IC Educate home">
        <span class="brand-mark">IC</span>
        <span>IC Educate</span>
      </a>
      <a id="loginBackLink" class="button small secondary" href="../find-tutor.html">Back to tutors</a>
    </header>

    <main class="login-shell">
      <section id="loginAuthStep" class="login-panel" aria-labelledby="loginTitle">
        <div class="login-panel-heading">
          <p class="eyebrow">Account</p>
          <h1 id="loginTitle">Sign in to IC Educate</h1>
        </div>
        <form id="loginAuthForm" class="login-form">
          <label class="field">
            <span>Name</span>
            <input id="loginName" type="text" autocomplete="name" placeholder="Your name" />
          </label>
          <label class="field">
            <span>Email or demo ID</span>
            <input id="loginEmail" type="text" inputmode="email" autocomplete="username" placeholder="you@example.com or demo" required />
          </label>
          <label class="field">
            <span>Password</span>
            <input id="loginPassword" type="password" autocomplete="current-password" placeholder="At least 6 characters" required />
          </label>
          <div class="button-row login-actions">
            <button type="submit">Sign in</button>
            <button id="loginSignUpBtn" type="button" class="secondary-btn">Create account</button>
          </div>
        </form>
        <p id="loginStatus" class="hint" aria-live="polite">Use one account across IC Educate.</p>
        <div class="login-legal-links">
          <a href="../privacy.html">Privacy</a>
          <a href="../terms.html">Terms</a>
          <a href="../support.html">Support</a>
        </div>
      </section>

      <section id="loginRoleStep" class="login-panel login-role-panel" aria-labelledby="roleTitle" hidden>
        <div class="login-panel-heading">
          <p class="eyebrow">Account type</p>
          <h1 id="roleTitle">How will you use IC Educate?</h1>
          <p id="roleAccountLabel" class="hint"></p>
        </div>
        <div class="login-role-grid">
          <button type="button" class="login-role-option" data-account-role="student">
            <img src="../assets/gradequest-student-dashboard.png" alt="" />
            <span><strong>I am a student</strong><small>Find tutors and manage learning.</small></span>
          </button>
          <button type="button" class="login-role-option" data-account-role="teacher">
            <img src="../assets/gradequest-role-teacher.png" alt="" />
            <span><strong>I am a teacher</strong><small>Create a teaching profile.</small></span>
          </button>
        </div>
        <p id="roleStatus" class="hint" aria-live="polite">You can change this later in Profile.</p>
      </section>
    </main>

    <script src="../config.js?v=20260719-marketplace-review-2"></script>
    <script src="../pwa.js?v=20260717-profile-auth-2"></script>
    <script src="./login.js?v=20260719-marketplace-review-2"></script>
  </body>
</html>
