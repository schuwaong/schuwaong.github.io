<!doctype html>
<html lang="en" data-ui-mode="exploratory">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elena’s One Shot 🎈</title>
  <meta name="description" content="A tiny funny one-shot balloon website for Elena." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="elena.css" />
  <link rel="stylesheet" href="/shared/ui-selector.css">
</head>
<body>
  <main class="stage">
    <section class="card">
      <p class="badge">Scientific Coffee Compatibility Test</p>
      <h1>Elena, you only get <span>one shot</span>.</h1>
      <p class="subtitle">The rules are simple. Pop the balloon. No pressure. Except literally all the pressure is inside the balloon.</p>

      <div class="arena" aria-label="Balloon challenge area">
        <button class="balloon" id="balloon" type="button" aria-label="Pop the balloon">
          <span class="shine"></span>
          <span class="face">😌</span>
        </button>
        <div class="blocker" id="blocker" aria-hidden="true">
          <span>🚫</span>
          <strong>BLOCKED</strong>
        </div>
      </div>

      <div class="string" aria-hidden="true"></div>

      <div class="message" id="message" aria-live="polite">
        <p class="small">Current status:</p>
        <p class="big">Balloon intact. Charm levels under review.</p>
      </div>

      <button class="reset" id="reset" type="button">secret admin reset, extremely official</button>
    </section>
  </main>

  <div class="confetti" aria-hidden="true"></div>
  <script src="elena.js"></script>
</body>
</html>
